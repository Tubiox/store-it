services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storeit_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - minio
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: storeit_frontend
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: storeit_nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: storeit_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    container_name: storeit_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to start...';
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/storeit || true;
      mc anonymous set public myminio/storeit || true;
      exit 0;
      "

volumes:
  minio_data:
